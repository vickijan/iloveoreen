<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>you've got mail!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Caveat:wght@500;600;700&family=IBM+Plex+Serif:ital,wght@0,400;0,600&display=swap" rel="stylesheet">
<style>
  /* ================================================================
     EDIT ME! Everything you'll want to personalize lives right here
     or in the CONFIG object near the bottom of this file, in the
     <script> tag. Search for "CONFIG" to jump there.
     ================================================================ */

 :root{
  --paper: #7D2027;
  --paper-dark: #673C34;
  --kraft: #998731;
  --kraft-dark: #673C34;
  --ink: #F9DEE3;
  --ink-soft: #FAE3B1;
  --sage: #5FABC2;
  --rose: #F9DEE3;
  --tape: #FAE3B1;
  --shadow: rgba(0, 0, 0, 0.35);
}

  *{ box-sizing: border-box; }

  html, body{
    margin:0;
    padding:0;
    height: 100%;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    overflow: hidden; /* the whole page never scrolls */
  }

  body{
    background-image:
      radial-gradient(circle at 1px 1px, rgba(46,42,36,0.05) 1px, transparent 0);
    background-size: 22px 22px;
  }

  h1, h2, h3{
    font-family: 'Fraunces', serif;
    margin: 0;
  }

  button{ font-family: inherit; }

  .doodle-float{
    position: fixed;
    width: 90px;
    pointer-events: none;
    z-index: 1;
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  .doodle-float.visible{ opacity: 1; }

  .doodle-float img{
    width: 100%;
    height: auto;
    display: block;
    filter: drop-shadow(0 6px 10px var(--shadow));
  }

  /* ---------------- Cover scene: the tin ---------------- */

  #cover{
    position: absolute;
    inset: 0;
    height: 100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding: 24px;
    transition: opacity 0.6s ease, visibility 0.6s ease;
  }

  #cover.hidden{
    opacity: 0;
    visibility: hidden;
    pointer-events:none;
  }

  .cover-label{
    font-family:'IBM Plex Serif', serif;
    font-size: 1.3rem;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }

  .cover-names{
    font-family:'Fraunces', serif;
    font-size: clamp(1.4rem, 4.5vh, 2.4rem);
    font-weight: 600;
    margin-bottom: clamp(16px, 3vh, 28px);
    line-height: 1.3;
  }

  .cover-names .to{ color: var(--rose); }
  .cover-names .from{ color: var(--sage); }

  #tin-button{
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  #tin-button svg{
    width: min(260px, 55vh, 65vw);
    height: auto;
    filter: drop-shadow(0 18px 24px var(--shadow));
    transition: transform 0.35s ease;
  }

  #tin-button:hover svg{ transform: translateY(-4px) rotate(-1deg); }
  #tin-button:focus-visible svg{ outline: 3px solid var(--sage); outline-offset: 6px; border-radius: 16px; }

  #tin-lid{
    transform-origin: 50% 88%;
    transition: transform 0.55s cubic-bezier(.34,1.56,.64,1);
  }

  #cover.opening #tin-lid{
    transform: translateY(-70px) rotate(-18deg);
  }

  .tap-hint{
    margin-top: clamp(12px, 2.5vh, 22px);
    color: var(--ink-soft);
    font-family:'IBM Plex Serif', serif;
    font-size: clamp(1rem, 2.2vh, 1.25rem);
  }

  /* ---------------- Shared overlay style (letter + note popups) ---------------- */

  .overlay{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 40;
  }

  .overlay.visible{ display: flex; }

  .overlay-paper{
    position: relative;
    background: var(--ink-soft);
    color: var(--paper);
    max-width: 480px;
    width: 100%;
    max-height: 82vh;
    overflow-y: auto;
    padding: 40px 34px;
    border-radius: 4px;
    box-shadow: 0 24px 48px rgba(0,0,0,0.4);
    font-family: 'IBM Plex Serif', serif;
    line-height: 1.6;
    animation: overlayIn 0.35s ease;
  }

  @keyframes overlayIn{
    from{ opacity: 0; transform: translateY(16px) scale(0.98); }
    to{ opacity: 1; transform: translateY(0) scale(1); }
  }

  .overlay-title{
    font-family: 'Caveat', cursive;
    font-size: 2rem;
    color: var(--paper);
    margin-bottom: 16px;
  }

  .overlay-body{ font-size: 1.05rem; white-space: pre-line; }

  .overlay-photo{
    width: 100%;
    border-radius: 4px;
    display: block;
    margin-bottom: 12px;
  }

  .overlay-close{
    position: absolute;
    top: 12px;
    right: 14px;
    background: none;
    border: none;
    font-size: 1.6rem;
    line-height: 1;
    cursor: pointer;
    color: var(--paper);
  }

  #reread-letter{
    position: fixed;
    bottom: 16px;
    right: 16px;
    background: var(--kraft);
    color: var(--ink);
    border: none;
    padding: 8px 14px;
    border-radius: 20px;
    font-family: 'IBM Plex Serif', serif;
    font-size: 0.85rem;
    cursor: pointer;
    box-shadow: 0 6px 16px var(--shadow);
    display: none;
    z-index: 30;
    transition: transform 0.2s ease;
  }

  #reread-letter:hover{ transform: translateY(-2px); }
  #reread-letter.visible{ display: inline-flex; align-items: center; gap: 6px; }

  /* ---------------- Board scene: everything on one screen ---------------- */

  #board{
    position: absolute;
    inset: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: clamp(16px, 3vh, 32px) 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.7s ease;
    overflow-y: auto; /* safety net only — sizing is tuned so this shouldn't be needed */
  }

  #board.visible{ opacity: 1; pointer-events: auto; }

  .board-header{
    text-align:center;
    margin-bottom: clamp(14px, 3vh, 30px);
    flex-shrink: 0;
  }

  .board-eyebrow{
    font-family:'IBM Plex Serif', serif;
    color: var(--rose);
    font-size: clamp(0.9rem, 2vh, 1.3rem);
  }

  .board-title{
    font-size: clamp(1.4rem, 4vh, 2.4rem);
    font-weight: 700;
    margin-top: 4px;
    color: var(--sage);
  }

  .board-sub{
    color: var(--ink-soft);
    margin-top: 8px;
    font-size: clamp(0.8rem, 1.8vh, 1rem);
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
  }

  .grid{
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    grid-auto-rows: minmax(clamp(90px, 15vh, 160px), auto);
    gap: clamp(16px, 2.8vh, 28px);
    max-width: 800px;
    width: 100%;
    flex-shrink: 0;
  }

  @media (max-width: 620px){
    .grid{ grid-template-columns: repeat(3, minmax(0, 1fr)); }
  }

  .card{
    --rot: 0deg;
    --offset: 0px;
    position: relative;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 8px 16px var(--shadow);
    transform: rotate(var(--rot)) translateY(var(--offset));
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  /* A repeating cycle of tilts/offsets so tiles feel scattered, not gridded */
  .card:nth-child(6n+1){ --rot: -4deg; --offset: 6px; }
  .card:nth-child(6n+2){ --rot: 3deg;  --offset: -8px; }
  .card:nth-child(6n+3){ --rot: -2deg; --offset: 8px; }
  .card:nth-child(6n+4){ --rot: 5deg;  --offset: -5px; }
  .card:nth-child(6n+5){ --rot: -3deg; --offset: 4px; }
  .card:nth-child(6n+6){ --rot: 2deg;  --offset: -7px; }

  .card:hover{
    transform: rotate(var(--rot)) translateY(calc(var(--offset) - 6px));
    box-shadow: 0 12px 22px var(--shadow);
  }
  .card:focus-visible{ outline: 3px solid var(--sage); outline-offset: 2px; }

  .tape{
    position:absolute;
    top:-8px;
    left:50%;
    transform:translateX(-50%) rotate(-3deg);
    width:40px;
    height:16px;
    background: var(--tape);
    opacity:0.85;
    box-shadow: 0 2px 3px var(--shadow);
    z-index: 2;
  }

  /* Note tiles — compact icon + label, full content opens in an overlay */
  .tile-card{
    background: var(--paper-dark);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap: 4px;
    padding: 8px;
    text-align:center;
  }

  .tile-icon{ font-size: clamp(1.3rem, 3.4vh, 1.9rem); }

  .tile-label{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size: clamp(0.62rem, 1.4vh, 0.8rem);
    color: var(--rose);
    line-height: 1.2;
  }

  /* Photo tiles — image fills the tile, caption overlays the bottom */
  .photo-card{ background: var(--paper-dark); }

  .photo-card img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .photo-card .no-photo{
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    color: var(--ink-soft);
    font-size: 0.7rem;
    text-align:center;
    padding: 6px;
  }

  .photo-caption{
    position:absolute;
    bottom:0; left:0; right:0;
    background: rgba(0,0,0,0.45);
    color: var(--ink-soft);
    font-family:'IBM Plex Serif', serif;
    font-size: clamp(0.6rem, 1.3vh, 0.78rem);
    padding: 3px 6px;
    text-align:center;
  }

  /* Song tile vinyl icon */
  .vinyl{
    width: clamp(30px, 5vh, 40px);
    height: clamp(30px, 5vh, 40px);
    border-radius: 50%;
    background: radial-gradient(circle at center, var(--paper-dark) 0 22%, var(--ink) 23% 26%, #3a352c 27% 100%);
    transition: transform 0.6s linear;
  }

  .tile-card:hover .vinyl{ transform: rotate(360deg); }

  /* Song tile — spans 2 grid columns (the width of the two tiles above it),
     and shows the player directly instead of opening on tap. */
  .song-embed-tile{
    grid-column: span 2;
    --rot: 0deg;
    --offset: 0px;
    background: var(--paper-dark);
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 8px;
    padding: 10px 14px;
    cursor: default;
  }

  .song-embed-tile .tile-row{
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .song-embed-tile .tile-label{ font-size: clamp(0.7rem, 1.5vh, 0.9rem); }

  .song-embed-tile iframe{ width: 100%; display: block; border: none; }

  .footer-note{
    text-align:center;
    margin-top: clamp(24px, 4.5vh, 40px);
    font-family:'IBM Plex Serif', serif;
    font-size: clamp(0.9rem, 2vh, 1.2rem);
    color: var(--ink-soft);
    flex-shrink: 0;
  }

  /* ---------------- Lightbox for full-size photos ---------------- */
  #lightbox{
    position: fixed;
    inset: 0;
    background: rgba(46,42,36,0.85);
    display:none;
    align-items:center;
    justify-content:center;
    padding: 24px;
    z-index: 50;
  }

  #lightbox.visible{ display:flex; }

  #lightbox img{
    max-width: min(520px, 90vw);
    max-height: 80vh;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }

  #lightbox-close{
    position:absolute;
    top: 20px;
    right: 24px;
    background:none;
    border:none;
    color: var(--paper);
    font-size: 2rem;
    cursor:pointer;
    line-height:1;
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>

  <!-- ============ COVER SCENE ============ -->
  <section id="cover">
    <div class="cover-label">you've got mail!</div>
    <div class="cover-names">
      <span class="to" id="to-name"></span> —
      <span class="from" id="from-name"></span>
    </div>

    <button id="tin-button" aria-label="Open your care package">
      <svg viewBox="0 0 260 220" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="130" cy="190" rx="92" ry="14" fill="var(--shadow)"/>
        <rect x="34" y="90" width="192" height="100" rx="8" fill="var(--kraft)"/>
        <rect x="34" y="90" width="192" height="100" rx="8" fill="url(#tinShade)"/>
        <rect x="46" y="102" width="168" height="76" rx="4" fill="none" stroke="var(--paper)" stroke-width="2" stroke-dasharray="4 6" opacity="0.5"/>
        <g id="tin-lid">
          <rect x="26" y="58" width="208" height="46" rx="10" fill="var(--kraft-dark)"/>
          <rect x="26" y="58" width="208" height="46" rx="10" fill="url(#lidShade)"/>
          <circle cx="130" cy="58" r="9" fill="var(--rose)"/>
        </g>
        <defs>
          <linearGradient id="tinShade" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#000" stop-opacity="0.05"/>
            <stop offset="1" stop-color="#000" stop-opacity="0.15"/>
          </linearGradient>
          <linearGradient id="lidShade" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#fff" stop-opacity="0.12"/>
            <stop offset="1" stop-color="#000" stop-opacity="0.1"/>
          </linearGradient>
        </defs>
      </svg>
    </button>
    <div class="tap-hint">tap the box to open it</div>
  </section>

  <!-- ============ LETTER OVERLAY ============ -->
  <div id="letter-overlay" class="overlay">
    <div class="overlay-paper">
      <button class="overlay-close" id="letter-close" aria-label="Close letter">&times;</button>
      <div class="overlay-title" id="letter-title"></div>
      <div class="overlay-body" id="letter-body"></div>
    </div>
  </div>

  <!-- ============ NOTE CONTENT OVERLAY (shared) ============ -->
  <div id="content-overlay" class="overlay">
    <div class="overlay-paper">
      <button class="overlay-close" id="content-close" aria-label="Close">&times;</button>
      <div class="overlay-title" id="content-title"></div>
      <div id="content-inner"></div>
    </div>
  </div>

  <!-- ============ REREAD LETTER BUTTON ============ -->
  <button id="reread-letter">reread the letter &#9993;</button>

  <!-- ============ BOARD SCENE ============ -->
  <section id="board" aria-live="polite">
    <div class="board-header">
      <div class="board-eyebrow" id="board-eyebrow"></div>
      <h1 class="board-title" id="board-title"></h1>
      <p class="board-sub" id="board-sub"></p>
    </div>

    <div class="grid" id="grid"></div>

    <p class="footer-note" id="footer-note"></p>
  </section>

  <!-- ============ LIGHTBOX ============ -->
  <div id="lightbox">
    <button id="lightbox-close" aria-label="Close photo">&times;</button>
    <img id="lightbox-img" src="" alt="">
  </div>

<script>
/* ==================================================================
   CONFIG — this is the only part you should need to touch.
   Fill in your own names, note text, photo links, and a song link.
   ================================================================== */
const CONFIG = {
  toName: "To: Oreen",
  fromName: "From: Vicki",
  eventName: "Happy 22nd Birthday <3",

  // The letter that pops up right after the tin opens.
  letter: {
    title: "Dear Oreen,",
    body: "Happy birthday bean!!! I love you sooo much and am so grateful to have you in my life.\n\nSince I couldn't celebrate with you in person this year, I figured I'd throw together this little digital present. I'm so excited for you and your upcoming chapter in Chicago. I did a little research and found these places that were so cute to me (and supposedly are good). Hopefully, you'll get to check them out-- when you do, coffee's on me :).\n\nLove,\nVicki"
  },

  boardEyebrow: "to Oreen with love...",
  boardTitle: "a very special birthday box",
  boardSub: "Here's a little digital keepsake you can always fit us in your pocket! Tap around to explore.",

  // Notes open in a popup when tapped. Add a "photo" URL to show an image
  // inside the popup. Leave photo empty ("") for a note with no image.
  notes: [
    {
      title: "Open me!!!!!",
      photo: "https://images.squarespace-cdn.com/content/v1/668bf6b529c84b0af3f577c5/1720820445142-TU7DBK28Q549VPQYXYK7/SawadaNYC-3429.jpg",
      body: "Sawada. Heard the military latte was good??"
    },
    {
      title: "Open me too!!!!!!",
      photo: "https://www.chicagotribune.com/wp-content/uploads/2026/01/CTC-L-FOOD-TEAM-REVIEWS-0107-12_256649818.jpg",
      body: "Buttercup! This place looks sooo sweet to me"
    }
  ],

  // Photos. Replace src with a real image URL. Leave src empty for a placeholder tile.
  photos: [
    { src: "https://i.imgur.com/0ncMZWB.jpeg", caption: "babe + wifey" },
    { src: "https://i.imgur.com/2vPhDMV.jpeg", caption: "pretend these are for u K" },
    { src: "https://i.imgur.com/bBw9Ils.jpeg", caption: "the chewy to my anakin" },
    { src: "https://i.imgur.com/fIphYvt.jpeg", caption: "TFB 4EVER" }
  ],

  // A song or playlist link — shown as a wide, always-visible embedded player.
  song: {
    label: "a little something to play",
    title: "",
    url: "https://open.spotify.com/track/3SeDS5sSoWnwAZvVgkdKzf",
    embed: "https://open.spotify.com/embed/track/3SeDS5sSoWnwAZvVgkdKzf?utm_source=generator&si=353fe974502b4506"
  },

  // Floating image stickers, scattered across the screen.
  // These only fade in once the tin has been opened.
  stickers: [
    { src: "https://i.imgur.com/9LvHbVl.png", top: "8%",  left: "6%",  rotate: "-8deg", width: "70px" },
    { src: "https://i.imgur.com/kE0j4Lb.png", top: "10%", left: "82%", rotate: "10deg", width: "75px" },
    { src: "https://i.imgur.com/gPuiK2d.png", top: "48%", left: "88%", rotate: "-5deg", width: "80px" },
    { src: "https://i.imgur.com/QcRsMpM.png", top: "48%", left: "4%",  rotate: "6deg",  width: "80px" },
    { src: "https://i.imgur.com/OsMyfEQ.png", top: "74%", left: "4%",  rotate: "-4deg", width: "88px" }
  ],

  footerNote: "love you so much — miss you, see you soon <3"
};

/* ================= rendering (no need to edit below) ================= */

document.getElementById('to-name').textContent = CONFIG.toName;
document.getElementById('from-name').textContent = CONFIG.fromName;
document.getElementById('board-eyebrow').textContent = CONFIG.boardEyebrow;
document.getElementById('board-title').textContent = CONFIG.boardTitle;
document.getElementById('board-sub').textContent = CONFIG.boardSub;
document.getElementById('footer-note').textContent = CONFIG.footerNote;
document.getElementById('letter-title').textContent = CONFIG.letter.title;
document.getElementById('letter-body').textContent = CONFIG.letter.body;

const grid = document.getElementById('grid');

// Shared content overlay (used by notes)
const contentOverlay = document.getElementById('content-overlay');
const contentTitle = document.getElementById('content-title');
const contentInner = document.getElementById('content-inner');
document.getElementById('content-close').addEventListener('click', () => contentOverlay.classList.remove('visible'));
contentOverlay.addEventListener('click', (e) => { if (e.target === contentOverlay) contentOverlay.classList.remove('visible'); });

function openContent(title, innerHtml){
  contentTitle.textContent = title;
  contentInner.innerHTML = innerHtml;
  contentOverlay.classList.add('visible');
}

// Notes — compact tile, full text opens in the shared overlay
CONFIG.notes.forEach((note) => {
  const card = document.createElement('div');
  card.className = 'card tile-card';
  card.tabIndex = 0;
  card.setAttribute('role', 'button');
  card.innerHTML = `
    <div class="tape"></div>
    <div class="tile-icon">💌</div>
    <div class="tile-label">${note.title}</div>
  `;
  const open = () => {
    const photoHtml = note.photo ? `<img class="overlay-photo" src="${note.photo}" alt="">` : '';
    openContent(note.title, `${photoHtml}<div class="overlay-body">${note.body}</div>`);
  };
  card.addEventListener('click', open);
  card.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); } });
  grid.appendChild(card);
});

// Photos — thumbnail fills the tile, tap opens full-size lightbox
CONFIG.photos.forEach((photo) => {
  const card = document.createElement('div');
  card.className = 'card photo-card';
  card.tabIndex = photo.src ? 0 : -1;
  card.innerHTML = `
    <div class="tape"></div>
    ${photo.src ? `<img src="${photo.src}" alt="${photo.caption || 'photo'}">` : '<div class="no-photo">add a photo</div>'}
    ${photo.caption ? `<div class="photo-caption">${photo.caption}</div>` : ''}
  `;
  if (photo.src) {
    card.addEventListener('click', () => openLightbox(photo.src, photo.caption));
    card.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openLightbox(photo.src, photo.caption); } });
  }
  grid.appendChild(card);
});

// Song — wide tile spanning the width of the two tiles above it, player always visible
if (CONFIG.song) {
  const card = document.createElement('div');
  card.className = 'card song-embed-tile';
  card.innerHTML = `
    <div class="tape"></div>
    <div class="tile-row">
      <div class="vinyl"></div>
      <div class="tile-label">${CONFIG.song.label}</div>
    </div>
    ${CONFIG.song.embed ? `<iframe src="${CONFIG.song.embed}" height="80" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>` : ''}
  `;
  grid.appendChild(card);
}

// Floating image stickers — built now, kept invisible until the box is opened
CONFIG.stickers.forEach((sticker) => {
  const wrap = document.createElement('div');
  wrap.className = 'doodle-float';
  wrap.style.top = sticker.top;
  wrap.style.left = sticker.left;
  wrap.style.width = sticker.width || '80px';
  wrap.style.transform = `rotate(${sticker.rotate || '0deg'})`;
  wrap.innerHTML = `<img src="${sticker.src}" alt="">`;
  document.body.appendChild(wrap);
});

function showStickers(){
  document.querySelectorAll('.doodle-float').forEach((el) => el.classList.add('visible'));
}

// ---------------- Cover -> letter -> board flow ----------------
const cover = document.getElementById('cover');
const board = document.getElementById('board');
const letterOverlay = document.getElementById('letter-overlay');
const letterClose = document.getElementById('letter-close');
const rereadBtn = document.getElementById('reread-letter');

document.getElementById('tin-button').addEventListener('click', () => {
  cover.classList.add('opening');
  showStickers();
  setTimeout(() => {
    cover.classList.add('hidden');
    letterOverlay.classList.add('visible');
  }, 450);
});

function revealBoardIfNeeded(){
  if (!board.classList.contains('visible')) {
    board.classList.add('visible');
    rereadBtn.classList.add('visible');
  }
}

function closeLetter(){
  letterOverlay.classList.remove('visible');
  revealBoardIfNeeded();
}

letterClose.addEventListener('click', closeLetter);
letterOverlay.addEventListener('click', (e) => { if (e.target === letterOverlay) closeLetter(); });
rereadBtn.addEventListener('click', () => { letterOverlay.classList.add('visible'); });

// Lightbox
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
function openLightbox(src, alt){
  lightboxImg.src = src;
  lightboxImg.alt = alt || '';
  lightbox.classList.add('visible');
}
document.getElementById('lightbox-close').addEventListener('click', () => lightbox.classList.remove('visible'));
lightbox.addEventListener('click', (e) => { if (e.target === lightbox) lightbox.classList.remove('visible'); });
</script>
</body>
</html>
